# Сборка клиентского aw-portal-uploader.exe (PyInstaller, один файл).
# Установка: скачать artifact из Actions после успешного прогона.
name: Build Windows aw-portal-uploader.exe

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "portal/agent/**"
      - ".github/workflows/build-portal-uploader-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: portal/agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe (PyInstaller)
        working-directory: portal/agent
        run: pyinstaller --onefile --name aw-portal-uploader --collect-all requests --collect-all mss --collect-all tkinter aw_portal_uploader/__main__.py

      - uses: actions/upload-artifact@v4
        with:
          name: aw-portal-uploader-windows
          path: portal/agent/dist/aw-portal-uploader.exe
